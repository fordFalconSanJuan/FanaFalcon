<div class="page-shell-galeria h-dvh overflow-hidden bg-gradient-to-br from-[#001e3c] via-[#002b5c] to-[#00408a] text-white">
  <div class="page-frame-galeria mt-16 h-[calc(100dvh-4rem)] px-2 py-2 sm:px-3 sm:py-3">
    <div class="galeria-layout mx-auto grid h-full max-w-7xl min-h-0 grid-cols-1 gap-2 sm:gap-3 lg:grid-cols-4">
      <div class="galeria-main min-h-0 lg:col-span-3">
        <div class="flex h-full min-h-0 flex-col overflow-hidden rounded-xl border border-white/10 bg-[#003478]/90 shadow-2xl ring-1 ring-white/10 backdrop-blur-md">
          <div class="galeria-header flex items-center justify-between gap-3 border-b border-white/10 px-3 py-2 sm:px-4">
            <h2 class="truncate text-sm font-bold tracking-[0.08em] text-[#ffcb05] sm:text-base md:text-lg">GALERÍA FANA FALCON</h2>
            <span class="text-[10px] text-blue-100 sm:text-xs">{{ currentSlide + 1 }} / {{ slides.length }}</span>
          </div>

          <div class="galeria-slider relative min-h-0 flex-1 overflow-hidden bg-transparent">
            <div class="flex h-full transition-transform duration-500 ease-in-out"
                 [style.transform]="'translateX(-' + (currentSlide * 100) + '%)'">
              @for (slide of slides; track slide.imageUrl) {
                <div class="h-full w-full flex-shrink-0">
                  <img [ngSrc]="slide.imageUrl"
                       [alt]="slide.title"
                       width="1600"
                       height="1067"
                       [priority]="$index === currentSlide"
                       sizes="(max-width: 1024px) 100vw, 75vw"
                       class="h-full w-full object-cover">
                </div>
              }
            </div>

            <button
              class="absolute left-2 top-1/2 z-10 flex h-8 w-8 -translate-y-1/2 items-center justify-center rounded-full bg-white/90 text-lg font-bold text-gray-700 shadow-lg transition-all hover:scale-105 hover:bg-white sm:left-3 sm:h-10 sm:w-10 sm:text-2xl"
              (click)="prevSlide()"
              aria-label="Imagen anterior">
              <span>‹</span>
            </button>

            <button
              class="absolute right-2 top-1/2 z-10 flex h-8 w-8 -translate-y-1/2 items-center justify-center rounded-full bg-white/90 text-lg font-bold text-gray-700 shadow-lg transition-all hover:scale-105 hover:bg-white sm:right-3 sm:h-10 sm:w-10 sm:text-2xl"
              (click)="nextSlide()"
              aria-label="Imagen siguiente">
              <span>›</span>
            </button>

            <div class="absolute bottom-2 left-1/2 z-10 flex -translate-x-1/2 gap-1.5 sm:bottom-3 sm:gap-2">
              @for (slide of slides; track $index) {
                <button class="h-2 w-2 rounded-full transition-all sm:h-2.5 sm:w-2.5"
                        [class]="$index === currentSlide ? 'bg-white scale-110' : 'bg-white/50 hover:bg-white/80'"
                        (click)="goToSlide($index)"
                        [attr.aria-label]="'Ir a imagen ' + ($index + 1)">
                </button>
              }
            </div>
          </div>

          <div class="galeria-footer flex items-center justify-center border-t border-white/10 px-3 py-2 text-center sm:px-6 sm:py-3">
            <h3 class="truncate text-sm font-bold uppercase tracking-[0.06em] sm:text-lg md:text-xl">
              {{ slides[currentSlide].title }}
            </h3>
          </div>
        </div>
      </div>

      <div class="galeria-detail hidden min-h-0 lg:block">
        <div class="h-full overflow-hidden rounded-xl border border-white/10 bg-[#003478]/90 shadow-2xl ring-1 ring-white/10 backdrop-blur-md">
          <div class="flex h-full min-h-0 flex-col p-4 xl:p-5">
            <div class="mb-3 flex-shrink-0">
              <h4 class="border-b border-blue-300/30 pb-2 text-sm font-bold uppercase tracking-wide text-white xl:text-base">
                Detalle
              </h4>
            </div>
            <div class="min-h-0 flex-1 overflow-y-auto pr-1">
              <p class="text-sm leading-relaxed text-gray-200 xl:text-base">
                {{ slides[currentSlide].description }}
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

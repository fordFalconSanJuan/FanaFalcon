<div class="absolute inset-0 z-0 overflow-hidden">
  <img
    [ngSrc]="slides[currentSlide].imageUrl"
    [alt]="slides[currentSlide].caption"
    fill
    [priority]="highPriority"
    class="w-full h-full object-cover object-center transition-opacity duration-1000"
    sizes="100vw"
  />
  <img
    [ngSrc]="slides[(currentSlide + 1) % slides.length].imageUrl"
    [alt]="slides[(currentSlide + 1) % slides.length].caption"
    fill
    class="invisible w-0 h-0"
    aria-hidden="true"
    sizes="1px"
  />
</div>

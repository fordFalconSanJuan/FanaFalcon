<div class="h-dvh overflow-hidden bg-gradient-to-br from-gray-900 to-black text-white">
  <div class="relative mt-16 h-[calc(100dvh-4rem)] overflow-hidden px-3 py-2 sm:px-4 sm:py-3">
    <div class="absolute inset-0 z-0">
      <app-carousel></app-carousel>
    </div>
    <div class="absolute inset-0 z-10 bg-black/60"></div>

    <div class="relative z-20 mx-auto flex h-full w-full max-w-6xl flex-col rounded-xl border border-blue-500/30 bg-gray-900/10 p-3 shadow-2xl backdrop-blur-xl sm:rounded-2xl sm:p-4 lg:p-5
                before:absolute before:inset-0 before:-z-10 before:bg-[url('assets/images/sanJuanVectorB.png')] before:bg-contain before:bg-center before:bg-no-repeat before:opacity-20 before:rounded-[inherit]
                after:absolute after:inset-0 after:-z-5 after:bg-gray-900/15 after:rounded-[inherit]">
      <div class="relative z-10 mb-3 flex items-center justify-between gap-3 sm:mb-4">
        <div class="flex min-w-0 items-center gap-2 sm:gap-3">
          <img
            ngSrc="assets/images/logo.png"
            alt="Logo"
            class="hidden h-11 w-11 rounded-full object-cover ring-2 ring-blue-500/50 shadow-xl sm:block md:h-12 md:w-12"
            height="1024" width="1024"/>
          <h1 class="racing-font truncate text-lg font-bold uppercase tracking-[0.07em] text-blue-200 sm:text-xl md:text-2xl">
            Albums
          </h1>
        </div>
        <div class="whitespace-nowrap text-[11px] font-medium text-gray-300 sm:text-xs">
          {{ albums.length }} álbumes
        </div>
      </div>

      <div class="relative z-10 min-h-0 flex-1">
        <div class="grid h-full grid-cols-2 grid-rows-3 gap-2 sm:gap-3 md:grid-cols-3 md:grid-rows-2">
          <div
            *ngFor="let album of paginatedAlbums; let i = index"
            (click)="openAlbum(getAlbumIndex(i))"
            class="group relative h-full w-full cursor-pointer overflow-hidden rounded-lg transition-all duration-300 hover:scale-[1.02]"
          >
            <div class="absolute inset-0 bg-gradient-to-br from-gray-800/70 to-gray-900/80 backdrop-blur-sm"></div>
            <div class="absolute inset-0 rounded-lg border border-blue-500/60 transition-colors duration-300 group-hover:border-blue-400/80"></div>
            <div class="relative z-10 flex h-full flex-col items-center justify-center p-2 text-center sm:p-3">
              <div class="max-h-12 overflow-hidden px-1 text-[11px] font-bold uppercase leading-tight tracking-[0.06em] text-white sm:text-sm md:text-base racing-font text-chrome">
                {{ album.title }}
              </div>
              <div class="mt-1 text-[10px] font-medium text-blue-300 sm:text-xs" style="font-family: 'Rajdhani', sans-serif;">
                {{ album.photos.length }} fotos
              </div>
              <div class="absolute inset-0 rounded-lg bg-blue-500/10 opacity-0 transition-opacity duration-300 group-hover:opacity-100"></div>
            </div>
            <div class="absolute left-0 top-0 h-1 w-full -translate-y-full bg-gradient-to-r from-transparent via-blue-400/50 to-transparent transition-transform duration-500 group-hover:translate-y-0"></div>
          </div>
        </div>
      </div>

      <div class="relative z-10 mt-3 flex flex-wrap items-center justify-center gap-2 sm:mt-4 sm:gap-3" *ngIf="totalPages > 1">
        <button
          (click)="prevPage()"
          [disabled]="currentPage === 0"
          class="rounded-lg bg-blue-600 px-2.5 py-1.5 text-xs text-white transition-all duration-200 hover:bg-blue-700 disabled:cursor-not-allowed disabled:bg-gray-600 sm:text-sm"
        >
          &#8592; Anterior
        </button>

        <div class="flex gap-1.5">
          <button
            *ngFor="let page of pageNumbers; trackBy: trackByPage"
            (click)="goToPage(page)"
            [class.bg-blue-600]="page === currentPage"
            [class.bg-gray-700]="page !== currentPage"
            class="h-7 w-7 rounded-lg text-[11px] font-medium text-white transition-all duration-200 hover:bg-blue-700 sm:h-8 sm:w-8 sm:text-xs"
          >
            {{ page + 1 }}
          </button>
        </div>

        <button
          (click)="nextPage()"
          [disabled]="currentPage === totalPages - 1"
          class="rounded-lg bg-blue-600 px-2.5 py-1.5 text-xs text-white transition-all duration-200 hover:bg-blue-700 disabled:cursor-not-allowed disabled:bg-gray-600 sm:text-sm"
        >
          Siguiente &#8594;
        </button>
      </div>

      <div class="relative z-10 mt-2 text-center text-[11px] text-gray-300 sm:text-xs" *ngIf="totalPages > 1">
        Página {{ currentPage + 1 }} de {{ totalPages }} ({{ albums.length }} álbumes)
      </div>
    </div>
  </div>

  <div *ngIf="showModal" class="fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-2 sm:p-4">
    <div class="relative w-full max-w-4xl">

      <div class="flex justify-between items-center mb-4">
        <div class="text-white">
          <h3 class="text-lg sm:text-xl font-semibold">{{ currentAlbum.title }}</h3>
          <p class="text-xs sm:text-sm text-gray-300">{{ photoIndex + 1 }} de {{ currentAlbum.photos.length }}</p>
        </div>
        <button
          (click)="closeModal()"
          class="text-white hover:text-red-400 text-2xl sm:text-3xl font-bold transition-colors duration-200 bg-gray-800/50 rounded-full w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center"
        >
          &times;
        </button>
      </div>

      <div class="relative bg-gray-800 rounded-lg overflow-hidden">
        <div *ngIf="imageLoading" class="absolute inset-0 flex items-center justify-center bg-gray-800">
          <div class="animate-spin rounded-full h-8 w-8 sm:h-12 sm:w-12 border-b-2 border-white"></div>
        </div>

        <img
          [src]="currentAlbum.photos[photoIndex].imageUrl"
          [alt]="currentAlbum.photos[photoIndex].caption"
          (load)="onImageLoad()"
          (error)="onImageError()"
          class="w-full h-auto max-h-[60vh] sm:max-h-[70vh] object-contain rounded-lg"
          [class.opacity-0]="imageLoading"
          [class.opacity-100]="!imageLoading"
          style="transition: opacity 0.3s ease-in-out;"
        />

        <button
          *ngIf="currentAlbum.photos.length > 1"
          (click)="prevPhoto()"
          class="absolute left-2 sm:left-4 top-1/2 transform -translate-y-1/2 text-white text-xl sm:text-2xl bg-black/50 hover:bg-black/70 rounded-full w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center transition-all duration-200 hover:scale-110"
        >
          &#8592;
        </button>

        <button
          *ngIf="currentAlbum.photos.length > 1"
          (click)="nextPhoto()"
          class="absolute right-2 sm:right-4 top-1/2 transform -translate-y-1/2 text-white text-xl sm:text-2xl bg-black/50 hover:bg-black/70 rounded-full w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center transition-all duration-200 hover:scale-110"
        >
          &#8594;
        </button>
      </div>

      <div *ngIf="currentAlbum.photos.length > 1"
           class="flex mt-4 space-x-2 overflow-x-auto pb-2">
        <img
          *ngFor="let photo of currentAlbum.photos; let i = index"
          [src]="photo.imageUrl"
          (click)="selectPhoto(i)"
          class="h-16 w-20 sm:h-20 sm:w-28 object-cover rounded-lg cursor-pointer border-2 transition-all duration-200 hover:scale-105 flex-shrink-0"
          [class.border-blue-500]="i === photoIndex"
          [class.border-gray-400]="i !== photoIndex"
          [alt]="photo.caption"
          loading="lazy"
        />
      </div>
    </div>
  </div>
</div>
